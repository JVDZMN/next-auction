name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel any in-progress run for the same branch/PR so redundant pushes
# don't queue up and waste minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Caches ~/.npm between runs — speeds up subsequent installs
          # for the same package-lock.json.
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` installs exactly what package-lock.json says and fails
        # if the lockfile is out of sync — safer than `npm install` in CI.
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://localhost/dummy

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://localhost/dummy

      - name: TypeScript
        run: npx tsc --noEmit
