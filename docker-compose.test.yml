name: next-auction-test

# Isolated test database — run integration tests against this, never against
# the development database. Data is ephemeral: the volume is destroyed on
# `docker compose -f docker-compose.test.yml down -v`

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: next-auction-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: next_auction_test
    ports:
      - "5433:5432"     # different host port from dev (5434) to avoid conflicts
    tmpfs:
      - /var/lib/postgresql/data   # in-memory — fastest possible, no persistent state
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - test-network

networks:
  test-network:
    name: next-auction-test-network
